name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Cordova
        run: npm install -g cordova@12

      - name: Create and build
        run: |
          cordova create myapp com.moneynotes.app MoneyNotes
          cp -r www/* myapp/www/
          cp www/config.xml myapp/config.xml
          cd myapp
          cordova platform add android
          cordova build android --debug
          echo "=== Find APK ==="
          find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoneyNotes-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
