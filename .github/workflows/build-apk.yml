name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create app com.moneynotes.app MoneyNotes
          # Cordova creates www/ inside app/. Replace with our files.
          # Our www/ contains index.html, manifest.json, icon.svg, config.xml
          cp www/index.html app/www/
          cp www/manifest.json app/www/
          cp www/icon.svg app/www/
          cp www/config.xml app/www/
          # Use our config.xml as Cordova's root config
          cp www/config.xml app/config.xml
          echo "=== App www/ contents ==="
          ls -la app/www/

      - name: Add Android platform
        run: cd app && cordova platform add android

      - name: Build APK
        run: cd app && cordova build android --debug

      - name: Verify APK has assets
        run: |
          echo "=== Checking APK for web assets ==="
          ls -la app/platforms/android/app/build/outputs/apk/debug/ || echo "APK not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoneyNotes-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
