name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create app com.moneynotes.app MoneyNotes
          cd app
          cordova platform add android
          # Replace default www with our app
          rm -rf www/*
          cp -r ../www/* www/

      - name: Build APK
        run: cd app && cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MoneyNotes-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
